name: Daily Digest

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:        # 支持手动触发，方便测试

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        run: python main.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEATHER_CITY: ${{ secrets.WEATHER_CITY }}              # 城市英文名，如 Beijing / Shanghai
          # 可选：AI 摘要功能（无 API Key 时会使用本地规则生成摘要）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 可选：Product Hunt API Token（无 Token 时会使用 RSS 备用方案）
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
