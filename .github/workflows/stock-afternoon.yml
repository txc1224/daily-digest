name: Stock Market - 港股收盘

on:
  schedule:
    # 北京时间 16:00 = UTC 08:00
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock market afternoon
        run: python main.py --mode stock-afternoon
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEATHER_CITY: ${{ secrets.WEATHER_CITY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
