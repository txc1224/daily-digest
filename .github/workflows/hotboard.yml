name: Update HotBoard

on:
  schedule:
    # 每天 3 次（北京时间 8:00, 13:00, 19:00）
    - cron: '0 0 * * *'   # UTC 00:00 = 北京 08:00
    - cron: '0 5 * * *'   # UTC 05:00 = 北京 13:00
    - cron: '0 11 * * *'  # UTC 11:00 = 北京 19:00
  workflow_dispatch:        # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate hotboard data
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --staged --quiet || git commit -m "chore: update hotboard data $(date -u +%Y-%m-%dT%H:%M)"
          git push
