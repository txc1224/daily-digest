<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotBoard - 全网热榜聚合</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #eff4ec;
    --card-bg: #f8fbf5;
    --text: #15201b;
    --text-secondary: #5b6b61;
    --accent: #c85b31;
    --border: rgba(83, 107, 97, 0.18);
    --shadow: 0 18px 44px rgba(28, 44, 34, 0.08);
    --shadow-strong: 0 28px 72px rgba(23, 35, 28, 0.14);
    --radius: 22px;
    --blue: #2d5f9a;
    --green: #2f8057;
    --orange: #a56e1c;
    --red: #a22c2c;
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

body {
    font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    background:
        radial-gradient(circle at 12% 18%, rgba(222, 87, 40, 0.16), transparent 0 28%),
        radial-gradient(circle at 88% 14%, rgba(32, 90, 72, 0.18), transparent 0 24%),
        linear-gradient(180deg, rgba(255, 248, 239, 0.72), transparent 22%),
        linear-gradient(135deg, #eff4ec 0%, #e2ece4 48%, #edf1ea 100%);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(21, 32, 27, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 32, 27, 0.035) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.48), transparent 85%);
    opacity: 0.45;
}

/* Header */
header {
    background: rgba(248, 251, 245, 0.82);
    backdrop-filter: blur(18px) saturate(135%);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

header h1 { font-size: 20px; font-weight: 700; }
.subtitle { color: var(--text-secondary); font-size: 13px; }

.header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.search-box {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    width: 180px;
    background: var(--card-bg);
    outline: none;
    transition: border-color 0.2s;
}

.search-box:focus { border-color: var(--blue); }

.filter-btn {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    background: var(--card-bg);
    transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--blue); }
.filter-btn.active { background: var(--text); color: white; border-color: var(--text); }

.history-select, .update-time {
    font-size: 12px;
    color: var(--text-secondary);
}

.history-select {
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    cursor: pointer;
}

/* Main */
main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
}

/* Filter panel */
.filter-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: none;
}

.filter-panel.show { display: block; }

.filter-panel h3 { font-size: 13px; margin-bottom: 8px; color: var(--text-secondary); }

.platform-toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.platform-toggle {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    background: var(--card-bg);
    transition: all 0.15s;
    user-select: none;
}

.platform-toggle.hidden { opacity: 0.4; text-decoration: line-through; }

/* Analysis section */
.analysis-section {
    background: linear-gradient(135deg, rgba(33, 89, 72, 0.95) 0%, rgba(200, 91, 49, 0.92) 100%);
    border-radius: 28px;
    padding: 20px;
    margin-bottom: 20px;
    color: white;
    box-shadow: var(--shadow-strong);
}

.analysis-section h2 { font-size: 16px; margin-bottom: 12px; }

.topic-cards {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
}

.topic-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 12px 16px;
    min-width: 260px;
    flex-shrink: 0;
}

.topic-card .topic-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.topic-card .topic-summary { font-size: 12px; opacity: 0.9; margin-bottom: 8px; }

.topic-platforms {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
}

.topic-platform-tag {
    font-size: 10px;
    padding: 2px 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
}

.heat-bar {
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
}

.heat-bar-fill {
    height: 100%;
    background: #ffcc00;
    border-radius: 2px;
    transition: width 0.5s;
}

/* Rising section */
.rising-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 20px;
}

.rising-section h2 { font-size: 15px; margin-bottom: 10px; }

.rising-list {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
}

.rising-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
}

.rising-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
}

.rising-badge.new { background: #ff3b30; color: white; }
.rising-badge.up { background: #34c759; color: white; }

.status-section,
.trend-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 20px;
}

.section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.section-title {
    font-size: 15px;
    font-weight: 700;
}

.section-subtitle {
    font-size: 12px;
    color: var(--text-secondary);
}

.health-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 12px;
}

.health-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    background: linear-gradient(180deg, #ffffff 0%, #f8f8fa 100%);
}

.health-card.warning {
    background: linear-gradient(180deg, #fff8f7 0%, #fff2ef 100%);
    border-color: #ffd8d3;
}

.health-label {
    display: block;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 6px;
}

.health-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
}

.health-history {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
}

.health-history-item {
    min-width: 92px;
    padding: 10px;
    border-radius: 10px;
    background: var(--bg);
    flex-shrink: 0;
}

.history-time {
    display: block;
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 4px;
}

.history-health {
    display: flex;
    gap: 6px;
    font-size: 11px;
}

.history-health strong { color: var(--green); }
.history-health em { color: var(--red); font-style: normal; }

.platform-trend-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
}

.platform-trend-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    background: linear-gradient(180deg, #ffffff 0%, #f7f7f9 100%);
}

.platform-trend-card.state-failing {
    border-color: #ffd8d3;
    background: linear-gradient(180deg, #fff8f7 0%, #fff2ef 100%);
}

.platform-trend-card.state-stale {
    border-color: #ffe3bf;
    background: linear-gradient(180deg, #fffaf3 0%, #fff4e6 100%);
}

.platform-trend-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
}

.platform-name {
    font-size: 14px;
    font-weight: 600;
}

.status-pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 600;
}

.status-healthy {
    background: rgba(52, 199, 89, 0.12);
    color: #1d7a3b;
}

.status-stale {
    background: rgba(255, 149, 0, 0.14);
    color: #9a5c00;
}

.status-failing {
    background: rgba(255, 59, 48, 0.12);
    color: #b3221a;
}

.platform-metrics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
}

.metric-pill {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg);
    border-radius: 999px;
    padding: 4px 8px;
}

.sparkline {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
}

.spark {
    height: 8px;
    flex: 1;
    border-radius: 999px;
    background: #d7d7dc;
}

.spark.healthy { background: var(--green); }
.spark.stale { background: var(--orange); }
.spark.failing { background: var(--red); }

.platform-error {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.45;
}

/* Group */
.group-section { margin-bottom: 24px; }

.group-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    padding-left: 4px;
    cursor: pointer;
    user-select: none;
}

.group-title::before { content: ""; margin-right: 6px; font-size: 12px; }
.group-title.collapsed::before { content: ""; }

.boards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    perspective: 1400px;
}

.boards-grid.collapsed { display: none; }

/* Card */
.board-card {
    --card-accent: rgba(200, 91, 49, 0.92);
    --card-accent-soft: rgba(200, 91, 49, 0.12);
    --pointer-x: 50%;
    --pointer-y: 25%;
    --tilt-x: 0deg;
    --tilt-y: 0deg;
    background:
        linear-gradient(180deg, rgba(251, 253, 249, 0.96), rgba(242, 247, 241, 0.98)),
        linear-gradient(120deg, rgba(255, 255, 255, 0.2), transparent);
    border-radius: 26px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 260ms var(--ease-out-quart), transform 260ms var(--ease-out-quart), border-color 220ms ease;
    position: relative;
    border: 1px solid rgba(83, 107, 97, 0.18);
    transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) translate3d(0, 0, 0);
    transform-style: preserve-3d;
    animation: card-enter 700ms var(--ease-out-expo) both;
    animation-delay: calc(var(--card-index, 0) * 36ms);
}

.board-card::before,
.board-card::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.board-card::before {
    background:
        radial-gradient(circle at var(--pointer-x) var(--pointer-y), rgba(255, 255, 255, 0.82), transparent 34%),
        linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.24) 100%);
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 260ms ease;
}

.board-card::after {
    inset: 0 0 auto;
    height: 4px;
    background: linear-gradient(90deg, var(--card-accent), color-mix(in srgb, var(--card-accent) 28%, white));
    opacity: 0.88;
}

.board-card[data-group="tech"] {
    --card-accent: rgba(32, 90, 72, 0.94);
    --card-accent-soft: rgba(32, 90, 72, 0.12);
}

.board-card[data-group="world"] {
    --card-accent: rgba(39, 77, 130, 0.92);
    --card-accent-soft: rgba(39, 77, 130, 0.12);
}

.board-card[data-group="domestic"] {
    --card-accent: rgba(200, 91, 49, 0.94);
    --card-accent-soft: rgba(200, 91, 49, 0.12);
}

.board-card[data-state="failing"] { --card-accent: rgba(162, 44, 44, 0.95); }
.board-card[data-state="stale"] { --card-accent: rgba(164, 110, 28, 0.94); }

.board-card:hover {
    box-shadow: var(--shadow-strong);
    border-color: color-mix(in srgb, var(--card-accent) 30%, rgba(83, 107, 97, 0.24));
}

.board-card:hover::before,
.board-card:focus-within::before { opacity: 1; }
.board-card.hidden-platform { display: none; }

.card-header {
    display: flex;
    align-items: center;
    padding: 16px 16px 0;
    gap: 10px;
    position: relative;
    z-index: 1;
}

.card-icon {
    width: 40px;
    height: 40px;
    font-size: 18px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--card-accent-soft));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
}

.card-title { font-size: 15px; font-weight: 700; flex: 1; letter-spacing: -0.02em; }

.card-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    min-width: 36px;
    min-height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 2px 4px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.64);
    border: 1px solid rgba(83, 107, 97, 0.16);
}

.card-link:hover { background: var(--card-accent-soft); transform: translateY(-1px); }
.card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 10px;
    color: var(--text-secondary);
    padding: 4px 16px 8px;
    position: relative;
    z-index: 1;
}

.card-toolbar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 0 16px 12px;
    position: relative;
    z-index: 1;
}

.toolbar-pill {
    font-size: 10px;
    color: var(--text-secondary);
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(83, 107, 97, 0.14);
    border-radius: 999px;
    padding: 4px 8px;
}

.card-cover {
    margin: 0 16px 12px;
    padding: 16px 16px 15px;
    border-radius: 20px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--card-accent) 18%, transparent), transparent 34%),
        linear-gradient(135deg, rgba(255, 248, 240, 0.92), rgba(244, 249, 243, 0.94));
    border: 1px solid color-mix(in srgb, var(--card-accent) 18%, rgba(83, 107, 97, 0.12));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
}

.card-cover::before {
    content: "";
    position: absolute;
    inset: auto -18% -28% auto;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--card-accent) 18%, white), transparent 68%);
    pointer-events: none;
}

.card-cover-github {
    background:
        linear-gradient(145deg, rgba(27, 41, 35, 0.96), rgba(18, 27, 23, 0.94)),
        radial-gradient(circle at top right, rgba(66, 182, 129, 0.18), transparent 38%);
    border-color: rgba(95, 166, 133, 0.18);
    color: rgba(244, 249, 243, 0.96);
}

.card-cover-github::before {
    background:
        radial-gradient(circle, rgba(95, 166, 133, 0.32), transparent 66%);
    opacity: 0.85;
}

.card-cover-github .cover-kicker,
.card-cover-github .cover-title,
.card-cover-github .cover-title:hover,
.card-cover-github .cover-summary {
    color: rgba(244, 249, 243, 0.96);
}

.card-cover-github .cover-pill {
    color: rgba(230, 242, 236, 0.88);
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.12);
}

.card-cover-github .cover-summary {
    color: rgba(213, 225, 219, 0.74);
}

.cover-github-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(160px, 0.8fr);
    gap: 14px;
    align-items: stretch;
}

.cover-github-main {
    min-width: 0;
}

.cover-rail {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.cover-rail-item {
    display: grid;
    grid-template-columns: 36px minmax(0, 1fr);
    gap: 10px;
    align-items: start;
    text-decoration: none;
    padding: 10px 10px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: transform 220ms var(--ease-out-quart), border-color 160ms ease, background 160ms ease;
}

.cover-rail-item:hover {
    transform: translateX(3px);
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(95, 166, 133, 0.28);
}

.cover-rail-rank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: rgba(215, 235, 226, 0.78);
    background: rgba(255, 255, 255, 0.08);
}

.cover-rail-title {
    color: rgba(243, 248, 245, 0.92);
    font-size: 12px;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.cover-kicker {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--card-accent) 74%, var(--text));
}

.cover-kicker::before {
    content: "";
    width: 24px;
    height: 1px;
    background: color-mix(in srgb, var(--card-accent) 64%, rgba(83, 107, 97, 0.2));
}

.cover-title {
    position: relative;
    z-index: 1;
    display: block;
    color: var(--text);
    text-decoration: none;
    font-size: 22px;
    line-height: 1.02;
    letter-spacing: -0.04em;
    max-width: 13ch;
    margin-bottom: 12px;
    text-wrap: balance;
}

.cover-title:hover { color: color-mix(in srgb, var(--card-accent) 72%, var(--text)); }

.cover-meta-row {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
}

.cover-pill {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--card-accent) 56%, var(--text));
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid color-mix(in srgb, var(--card-accent) 14%, rgba(83, 107, 97, 0.12));
}

.cover-summary {
    position: relative;
    z-index: 1;
    color: var(--text-secondary);
    font-size: 12px;
    line-height: 1.5;
    max-width: 38ch;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-alert {
    margin: 0 10px 10px;
    padding: 8px 10px;
    border-radius: 8px;
    background: #fff4f2;
    color: #b3221a;
    font-size: 11px;
    line-height: 1.45;
}

.hot-list {
    list-style: none;
    padding: 0 12px 14px;
    max-height: min(72vh, 760px);
    overflow-y: auto;
    position: relative;
    z-index: 1;
}

.hot-list::-webkit-scrollbar { width: 3px; }
.hot-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.hot-item {
    display: grid;
    grid-template-columns: 28px 16px minmax(0, 1fr) auto;
    align-items: start;
    padding: 10px 8px;
    border-radius: 14px;
    gap: 8px;
    transition: background 160ms ease, transform 220ms var(--ease-out-quart), border-color 160ms ease;
    border: 1px solid transparent;
}

.hot-item:hover {
    background: rgba(255, 255, 255, 0.74);
    transform: translate3d(3px, 0, 0);
    border-color: color-mix(in srgb, var(--card-accent) 18%, rgba(83, 107, 97, 0.12));
}
.hot-item.search-hidden { display: none; }

.item-rank {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    flex-shrink: 0;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.66);
    border: 1px solid rgba(83, 107, 97, 0.12);
}

.top-1 .item-rank { background: #ff3b30; color: white; }
.top-2 .item-rank { background: #ff9500; color: white; }
.top-3 .item-rank { background: #ffcc00; color: #1d1d1f; }

.item-trend {
    font-size: 10px;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
}

.trend-new { color: #ff3b30; font-weight: 700; }
.trend-up { color: #34c759; }
.trend-down { color: var(--text-secondary); }

.item-title {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    text-decoration: none;
    overflow: hidden;
    text-overflow: initial;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.item-title:hover { color: color-mix(in srgb, var(--card-accent) 80%, var(--text)); }

.item-hot {
    font-size: 10px;
    color: var(--text-secondary);
    flex-shrink: 0;
    white-space: nowrap;
    border-radius: 999px;
    padding: 5px 7px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(83, 107, 97, 0.12);
}

@keyframes card-enter {
    from {
        opacity: 0;
        transform: translate3d(0, 18px, 0) scale(0.985);
    }
    to {
        opacity: 1;
        transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) translate3d(0, 0, 0) scale(1);
    }
}

footer {
    text-align: center;
    padding: 20px;
    color: var(--text-secondary);
    font-size: 11px;
}

.loading-state, .error-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-secondary);
}

@media (max-width: 768px) {
    .boards-grid { grid-template-columns: 1fr; }
    .subtitle, .filter-btn { display: none; }
    .search-box { width: 140px; }
    .topic-cards { flex-direction: column; }
    .topic-card { min-width: auto; }
    .health-grid,
    .platform-trend-list { grid-template-columns: 1fr; }
    .board-card,
    .board-card:hover,
    .hot-item:hover { transform: none; }
    .card-icon { width: 36px; height: 36px; }
    .card-cover { margin: 0 14px 12px; padding: 14px 14px 13px; border-radius: 18px; }
    .cover-title { font-size: 18px; max-width: none; }
    .cover-github-grid { grid-template-columns: 1fr; }
}

@media (min-width: 1200px) {
    .boards-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
    }

    .board-card { transform: none !important; }
}
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>HotBoard</h1>
            <p class="subtitle">全网热榜聚合</p>
            <div class="header-actions">
                <input type="text" id="search-input" class="search-box" placeholder="搜索热榜..." oninput="onSearch(this.value)">
                <button class="filter-btn" onclick="toggleFilterPanel()">筛选</button>
                <select id="history-select" class="history-select" onchange="onHistoryChange(this.value)">
                    <option value="">最新</option>
                </select>
                <span id="update-time" class="update-time"></span>
            </div>
        </div>
    </header>

    <div id="filter-panel" class="filter-panel" style="max-width:1400px;margin:12px auto 0;"></div>

    <main id="main-content">
        <div class="loading-state"><h2>Loading...</h2></div>
    </main>

    <footer>
        <p>数据由 GitHub Actions 自动更新 · <a href="https://github.com/txc1224/daily-digest" style="color:var(--text-secondary)">HotBoard</a></p>
    </footer>

<script>
let currentData = null;
let hiddenPlatforms = JSON.parse(localStorage.getItem('hb_hidden') || '[]');

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

function trendHtml(item) {
    if (!item.trend || item.trend === 'same') return '';
    if (item.trend === 'new') return '<span class="item-trend trend-new">NEW</span>';
    if (item.trend === 'up') return `<span class="item-trend trend-up">${item.rank_change > 0 ? '↑'+item.rank_change : '↑'}</span>`;
    if (item.trend === 'down') return `<span class="item-trend trend-down">↓</span>`;
    return '';
}

function stateLabel(state) {
    if (state === 'failing') return '异常';
    if (state === 'stale') return '过期';
    return '正常';
}

function renderHealth(health, trendHistory) {
    if (!health) return '';
    const history = (trendHistory || {}).health_history || [];
    return `<section class="status-section">
        <div class="section-header">
            <div>
                <div class="section-title">抓取健康</div>
                <div class="section-subtitle">GitHub Pages 静态站同步展示平台状态、错误和最近几个快照的健康变化</div>
            </div>
        </div>
        <div class="health-grid">
            <div class="health-card">
                <span class="health-label">健康平台</span>
                <strong class="health-value">${health.healthy_count || 0}/${health.enabled_count || 0}</strong>
            </div>
            <div class="health-card warning">
                <span class="health-label">异常平台</span>
                <strong class="health-value">${health.failing_count || 0}</strong>
            </div>
            <div class="health-card">
                <span class="health-label">缓存过旧</span>
                <strong class="health-value">${health.stale_count || 0}</strong>
            </div>
        </div>
        ${history.length ? `<div class="health-history">${history.map(item => `
            <div class="health-history-item">
                <span class="history-time">${escapeHtml((item.id || '').slice(5).replace(/-/g, '/'))}</span>
                <div class="history-health"><strong>${item.healthy_count || 0}</strong><em>${item.failing_count || 0}</em></div>
            </div>`).join('')}</div>` : ''}
    </section>`;
}

function renderPlatformTrends(trendHistory) {
    const trends = (trendHistory || {}).platform_trends || [];
    if (!trends.length) return '';
    return `<section class="trend-section">
        <div class="section-header">
            <div>
                <div class="section-title">平台趋势</div>
                <div class="section-subtitle">最近几次快照的可用率、响应耗时和当前错误</div>
            </div>
        </div>
        <div class="platform-trend-list">${trends.map(item => `
            <article class="platform-trend-card state-${escapeHtml(item.state || 'healthy')}">
                <div class="platform-trend-head">
                    <div class="platform-name">${escapeHtml(item.name || item.platform)}</div>
                    <span class="status-pill status-${escapeHtml(item.state || 'healthy')}">${stateLabel(item.state)}</span>
                </div>
                <div class="platform-metrics">
                    <span class="metric-pill">可用率 ${Math.round((item.availability_rate || 0) * 100)}%</span>
                    ${item.current_duration_ms != null ? `<span class="metric-pill">当前 ${item.current_duration_ms}ms</span>` : ''}
                    ${item.avg_duration_ms != null ? `<span class="metric-pill">均值 ${item.avg_duration_ms}ms</span>` : ''}
                </div>
                <div class="sparkline">${(item.sparkline || []).map(state => `<span class="spark ${escapeHtml(state)}"></span>`).join('')}</div>
                <div class="platform-error">${escapeHtml(item.last_error || '最近无错误')}</div>
            </article>`).join('')}
        </div>
    </section>`;
}

function renderAnalysis(analysis) {
    const topics = (analysis || {}).cross_platform_topics || [];
    if (!topics.length) return '';
    return `<div class="analysis-section">
        <h2>跨平台热点分析</h2>
        <div class="topic-cards">${topics.map(t => `
            <div class="topic-card">
                <div class="topic-name">${escapeHtml(t.topic)}</div>
                <div class="topic-summary">${escapeHtml(t.summary)}</div>
                <div class="topic-platforms">${t.platforms.map(p => `<span class="topic-platform-tag">${escapeHtml(p)}</span>`).join('')}</div>
                <div class="heat-bar"><div class="heat-bar-fill" style="width:${t.heat_score}%"></div></div>
            </div>`).join('')}
        </div>
    </div>`;
}

function renderRising(rising) {
    if (!rising || !rising.length) return '';
    return `<div class="rising-section">
        <h2>飙升热点</h2>
        <div class="rising-list">${rising.map(r => {
            const badge = r.trend === 'new'
                ? '<span class="rising-badge new">NEW</span>'
                : `<span class="rising-badge up">↑${r.rank_change}</span>`;
            return `<div class="rising-item">${badge}<span>${escapeHtml(r.title)}</span><span style="color:var(--text-secondary);font-size:10px">${escapeHtml(r.platform_name||r.platform)}</span></div>`;
        }).join('')}</div>
    </div>`;
}

function renderBoard(board) {
    const status = (((currentData || {}).statuses || {})[board.platform]) || {};
    const time = board.updated_at ? board.updated_at.substring(11, 19) : '';
    const isHidden = hiddenPlatforms.includes(board.platform);
    const featured = (board.items || [])[0];
    const itemsHtml = (board.items || []).map(item => {
        const topClass = item.rank <= 3 ? ` top-${item.rank}` : '';
        const hotHtml = item.hot_value ? `<span class="item-hot">${escapeHtml(item.hot_value)}</span>` : '';
        return `<li class="hot-item${topClass}" data-title="${escapeHtml(item.title).toLowerCase()}">
            <span class="item-rank">${item.rank}</span>
            ${trendHtml(item)}
            <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="item-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</a>
            ${hotHtml}
        </li>`;
    }).join('');
    const state = status.state || 'healthy';
    const toolbar = [
        `<span class="toolbar-pill">${(board.items || []).length} 条</span>`,
        status.last_duration_ms != null ? `<span class="toolbar-pill">${status.last_duration_ms}ms</span>` : '',
        status.last_item_count ? `<span class="toolbar-pill">${status.last_item_count} 条抓取</span>` : '',
    ].filter(Boolean).join('');
    const cover = featured && board.platform === 'github' ? `<div class="card-cover card-cover-github">
        <div class="cover-kicker">Featured Signal</div>
        <div class="cover-github-grid">
            <div class="cover-github-main">
                <a href="${escapeHtml(featured.url)}" target="_blank" rel="noopener" class="cover-title" title="${escapeHtml(featured.title)}">${escapeHtml(featured.title)}</a>
                <div class="cover-meta-row">
                    ${featured.hot_value ? `<span class="cover-pill">${escapeHtml(featured.hot_value)}</span>` : ''}
                    <span class="cover-pill">TOP ${featured.rank}</span>
                    <span class="cover-pill">Repo Cover</span>
                </div>
                ${featured.category ? `<p class="cover-summary">${escapeHtml(featured.category)}</p>` : ''}
            </div>
            <div class="cover-rail">${(board.items || []).slice(1, 4).map(item => `
                <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="cover-rail-item" title="${escapeHtml(item.title)}">
                    <span class="cover-rail-rank">#${item.rank}</span>
                    <span class="cover-rail-title">${escapeHtml(item.title)}</span>
                </a>
            `).join('')}</div>
        </div>
    </div>` : featured ? `<div class="card-cover">
        <div class="cover-kicker">Featured Signal</div>
        <a href="${escapeHtml(featured.url)}" target="_blank" rel="noopener" class="cover-title" title="${escapeHtml(featured.title)}">${escapeHtml(featured.title)}</a>
        <div class="cover-meta-row">
            ${featured.hot_value ? `<span class="cover-pill">${escapeHtml(featured.hot_value)}</span>` : ''}
            <span class="cover-pill">TOP ${featured.rank}</span>
            <span class="cover-pill">${escapeHtml(board.platform_name || '')}</span>
        </div>
        ${featured.category ? `<p class="cover-summary">${escapeHtml(featured.category)}</p>` : ''}
    </div>` : '';

    return `<div class="board-card${isHidden ? ' hidden-platform' : ''}" data-platform="${board.platform}" data-group="${escapeHtml(board.group || '')}" data-state="${escapeHtml(state)}" style="--card-index:${board.platform_name ? board.platform_name.length : 0}">
        <div class="card-header">
            <span class="card-icon">${board.icon}</span>
            <span class="card-title">${escapeHtml(board.platform_name)}</span>
            <a href="${escapeHtml(board.source_url)}" target="_blank" rel="noopener" class="card-link">&#x2197;</a>
        </div>
        <div class="card-meta"><span class="status-pill status-${escapeHtml(state)}">${stateLabel(state)}</span><span>更新于 ${time}</span></div>
        <div class="card-toolbar">${toolbar}</div>
        ${cover}
        <ul class="hot-list">${itemsHtml}</ul>
        ${status.last_error ? `<div class="card-alert">${escapeHtml(status.last_error)}</div>` : ''}
    </div>`;
}

function renderData(data) {
    currentData = data;
    const main = document.getElementById('main-content');
    const timeEl = document.getElementById('update-time');

    if (data.generated_at) {
        timeEl.textContent = data.generated_at.substring(0, 19).replace('T', ' ');
    }

    let html = '';
    html += renderHealth(data.health, data.trend_history);
    html += renderPlatformTrends(data.trend_history);
    html += renderAnalysis(data.analysis);
    html += renderRising(data.rising_topics);

    const grouped = data.grouped || {};
    for (const [gk, group] of Object.entries(grouped)) {
        const boardsHtml = (group.boards || []).map(renderBoard).join('');
        html += `<section class="group-section">
            <h2 class="group-title" onclick="toggleGroup(this)">${escapeHtml(group.name)}</h2>
            <div class="boards-grid">${boardsHtml}</div>
        </section>`;
    }

    main.innerHTML = html || '<div class="loading-state"><h2>暂无数据</h2></div>';
    renderFilterPanel(data);
    initBoardCardEffects();
}

function initBoardCardEffects() {
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    const cards = Array.from(document.querySelectorAll('.board-card'));

    cards.forEach((card, index) => {
        card.style.setProperty('--card-index', String(index));
        if (!canHover || reduceMotion) return;

        card.onpointermove = (event) => {
            const rect = card.getBoundingClientRect();
            const px = (event.clientX - rect.left) / rect.width;
            const py = (event.clientY - rect.top) / rect.height;
            card.style.setProperty('--pointer-x', `${(px * 100).toFixed(2)}%`);
            card.style.setProperty('--pointer-y', `${(py * 100).toFixed(2)}%`);
            card.style.setProperty('--tilt-x', `${((0.5 - py) * 6).toFixed(2)}deg`);
            card.style.setProperty('--tilt-y', `${((px - 0.5) * 7).toFixed(2)}deg`);
        };

        card.onpointerleave = () => {
            card.style.removeProperty('--pointer-x');
            card.style.removeProperty('--pointer-y');
            card.style.removeProperty('--tilt-x');
            card.style.removeProperty('--tilt-y');
        };
    });
}

function renderFilterPanel(data) {
    const panel = document.getElementById('filter-panel');
    const boards = data.boards || {};
    const platforms = Object.entries(boards).map(([k, v]) => ({
        id: k,
        name: v.platform_name || k,
        icon: v.icon || '',
    }));

    panel.innerHTML = `<h3>平台筛选（点击切换显示/隐藏）</h3>
        <div class="platform-toggles">${platforms.map(p =>
            `<span class="platform-toggle${hiddenPlatforms.includes(p.id) ? ' hidden' : ''}" data-platform="${p.id}" onclick="togglePlatform('${p.id}', this)">${p.icon} ${escapeHtml(p.name)}</span>`
        ).join('')}</div>`;
}

async function loadData(url) {
    const main = document.getElementById('main-content');
    main.innerHTML = '<div class="loading-state"><h2>Loading...</h2></div>';
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        if ((!payload.statuses || !payload.health) && url.endsWith('/boards.json')) {
            try {
                const statusRes = await fetch('./api/status.json');
                if (statusRes.ok) {
                    const statusPayload = await statusRes.json();
                    payload.statuses = payload.statuses || statusPayload.statuses;
                    payload.health = payload.health || statusPayload.health;
                    payload.trend_history = payload.trend_history || statusPayload.trend_history;
                }
            } catch (e) {}
        }
        renderData(payload);
    } catch (e) {
        main.innerHTML = `<div class="error-state"><h2>加载失败</h2><p>${escapeHtml(e.message)}</p></div>`;
    }
}

async function loadHistory() {
    try {
        const res = await fetch('./api/history.json');
        if (!res.ok) return;
        const history = await res.json();
        const select = document.getElementById('history-select');
        history.sort((a, b) => b.id.localeCompare(a.id));
        for (const item of history) {
            const opt = document.createElement('option');
            opt.value = item.file;
            const p = item.id.split('-');
            const summary = item.failing_count ? ` · 异常 ${item.failing_count}` : '';
            opt.textContent = `${p[1]}-${p[2]} ${p[3]}:00${summary}`;
            select.appendChild(opt);
        }
    } catch (e) {}
}

function onHistoryChange(v) { loadData(v ? './api/' + v : './api/boards.json'); }

function onSearch(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('.hot-item').forEach(el => {
        const title = el.getAttribute('data-title') || '';
        el.classList.toggle('search-hidden', q && !title.includes(q));
    });
}

function toggleFilterPanel() {
    document.getElementById('filter-panel').classList.toggle('show');
}

function togglePlatform(platform, el) {
    const idx = hiddenPlatforms.indexOf(platform);
    if (idx >= 0) { hiddenPlatforms.splice(idx, 1); } else { hiddenPlatforms.push(platform); }
    localStorage.setItem('hb_hidden', JSON.stringify(hiddenPlatforms));
    el.classList.toggle('hidden');
    document.querySelectorAll(`.board-card[data-platform="${platform}"]`).forEach(c => c.classList.toggle('hidden-platform'));
}

function toggleGroup(el) {
    el.classList.toggle('collapsed');
    el.nextElementSibling.classList.toggle('collapsed');
}

// Init
loadData('./api/boards.json');
loadHistory();

// URL params
const params = new URLSearchParams(location.search);
if (params.get('q')) {
    document.getElementById('search-input').value = params.get('q');
    setTimeout(() => onSearch(params.get('q')), 500);
}
</script>
</body>
</html>
